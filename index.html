<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignivisions | Triage OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Courier New', Courier, monospace; background-color: #0d1117; color: #c9d1d9; }
        #header { padding: 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        #header h1 { margin: 0; font-size: 24px; color: #58a6ff; }
        #main { display: flex; height: calc(100vh - 70px); }
        #panel { width: 350px; padding: 20px; background: #0d1117; border-right: 1px solid #30363d; display: flex; flex-direction: column; gap: 15px; }
        #map { flex-grow: 1; background: #000; }
        .btn { background: #da3633; color: white; border: none; padding: 15px; font-size: 16px; cursor: pointer; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .btn:hover { background: #b62324; }
        .card { background: #161b22; padding: 15px; border-radius: 5px; border: 1px solid #30363d; display: none; }
        .card.active { display: block; border-color: #da3633; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .red { color: #ff7b72; font-weight: bold; margin-top: 0; }
    </style>
</head>
<body>
    <div id="header">
        <h1>Ignivisions OS</h1>
        <span>SaaS Mode: MONITOREO ACTIVO</span>
    </div>
    <div id="main">
        <div id="panel">
            <p>Conectado a API NASA FIRMS & OpenWeather. Latencia esperada: < 3s.</p>
            <button class="btn" onclick="simularAlerta()">Simular Alerta Térmica</button>

            <div id="alertaCard" class="card">
                <h3 class="red">⚠️ CÓDIGO ROJO: IGNICIÓN</h3>
                <div class="data-row"><span>Zona:</span> <span>Reserva Nonguén</span></div>
                <div class="data-row"><span>Lat/Lon:</span> <span>-36.833, -72.983</span></div>
                <div class="data-row"><span>Viento:</span> <span>25 km/h NO</span></div>
                <div class="data-row"><span>Humedad:</span> <span>30%</span></div>
                <div class="data-row"><span>Triage:</span> <span class="red">CRÍTICO</span></div>
                <p style="font-size: 12px; color: #8b949e; margin-top: 15px;">Tiempo de procesamiento: 1.2s</p>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        // Mapa centrado en Concepción (Tema oscuro táctico)
        var map = L.map('map').setView([-36.8201, -73.0444], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var marker;

        function simularAlerta() {
            document.getElementById('alertaCard').classList.add('active');
            if(marker) map.removeLayer(marker);
            
            // Coordenadas de riesgo en Nonguén
            var lat = -36.8335;
            var lng = -72.9832;
            
            var redIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                iconSize: [25, 41], iconAnchor: [12, 41]
            });

            marker = L.marker([lat, lng], {icon: redIcon}).addTo(map);
            map.flyTo([lat, lng], 14, { animate: true, duration: 1.5 });
            
            L.circle([lat, lng], { color: 'red', fillColor: '#f03', fillOpacity: 0.5, radius: 600 }).addTo(map);
        }
    </script>
</body>
</html>
